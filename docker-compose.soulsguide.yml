services:

  # ─────────────────────────────────────────────
  # BANCOS DE DADOS
  # ─────────────────────────────────────────────

  db-postgre:
    image: postgres:16-alpine
    container_name: db-postgre
    environment:
      POSTGRES_DB: user-api
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER} -d user-api" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

  # ─────────────────────────────────────────────
  # SPRING CLOUD
  # ─────────────────────────────────────────────

  eureka-server:
    image: xcorpiiion/eureka-server-api:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  config-server:
    image: xcorpiiion/config-server-api:latest
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: config-server
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  gateway-api:
    image: xcorpiiion/api-gateway:latest
    container_name: gateway-api
    ports:
      - "8765:8765"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: gateway-api
      SPRING_PROFILES_ACTIVE: docker
      JWT_TOKEN_SECRET: ${JWT_SECRET}
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8765/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256m

  # ─────────────────────────────────────────────
  # MICROSERVIÇOS
  # ─────────────────────────────────────────────

  user-api:
    image: xcorpiiion/user-api:latest
    container_name: user-api
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: user-api
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-postgre:5432/user-api
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_ROOT_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_ROOT_PASS}
      JWT_TOKEN_SECRET: ${JWT_SECRET}
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
    depends_on:
      db-postgre:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8090/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m

  authorization-api:
    image: xcorpiiion/authorization-api:latest
    container_name: authorization-api
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: authorization-api
      JWT_TOKEN_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      DEFAULT_SOCIAL_PASSWORD: ${DEFAULT_SOCIAL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      USER_API_INTERNAL_URL: http://user-api:8090
    depends_on:
      config-server:
        condition: service_healthy
      user-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres-data:
  redis-data:

networks:
  microservices-net:
    driver: bridge
